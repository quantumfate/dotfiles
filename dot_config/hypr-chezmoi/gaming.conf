windowrule=workspace 5, float on, center on, content game, opacity 1.0 override, no_anim on, match:class Dofus.x64
windowrule=workspace 5, float on, center on, match:class Ankama Launcher, match:title overlay
windowrule=workspace 5, center on, size 1500 1000, float on, match:initial_class Ankama Launcher
windowrule=workspace 5, fullscreen_state 2 2, match:class steam_app_\d+

windowrule=workspace 5, match:class (steam), suppress_event activatefocus
windowrule=workspace 5, match:class (steam), suppress_event activate
windowrule=workspace 5, match:class (steam), move 300 400, match:title Friends List
windowrule=workspace 5, match:class (steam), move 600 600, match:title Launching...
